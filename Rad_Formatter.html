<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiology Report Formatter</title>
    <style>
        /* Single column layout styling */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 20px;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f9f9fb;
        }

        h2 {
            margin-bottom: 5px;
            color: #333;
        }

        p.instructions {
            margin-top: 0;
            margin-bottom: 20px;
            color: #666;
            font-size: 0.95em;
        }

        /* Taskbar (Toolbar) styling */
        #toolbar {
            width: 95%;
            max-width: 1000px;
            border: 1px solid #ccc;
            border-radius: 6px 6px 0 0;
            background-color: #ffffff;
            padding: 10px;
            display: flex;
            gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            align-items: center;
        }

        /* Manual format buttons */
        .format-btn {
            padding: 8px 14px;
            font-size: 1.1em;
            cursor: pointer;
            background-color: #f1f3f4;
            border: 1px solid #ddd;
            border-radius: 4px;
            color: #333;
            transition: all 0.2s;
        }

        .format-btn:hover { background-color: #e2e6ea; }
        
        .format-btn[data-command="bold"] { font-weight: bold; }
        .format-btn[data-command="italic"] { font-style: italic; }
        .format-btn[data-command="underline"] { text-decoration: underline; }

        /* The new Auto-Format button */
        #auto-format-btn {
            margin-left: auto; /* Pushes it to the right side of the taskbar */
            padding: 8px 16px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            background-color: #4CAF50; /* Green */
            color: white;
            border: none;
            border-radius: 4px;
            box-shadow: 0 2px 4px rgba(76, 175, 80, 0.3);
            transition: background-color 0.2s;
        }

        #auto-format-btn:hover { background-color: #45a049; }

        /* Big Editor styling */
        #editor {
            width: 95%;
            max-width: 1000px;
            height: 60vh;
            border: 1px solid #ccc;
            border-top: none; 
            border-radius: 0 0 6px 6px;
            background-color: white;
            padding: 20px;
            overflow-y: auto; 
            font-size: 1.15em;
            line-height: 1.6;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            white-space: pre-wrap; /* Keeps spacing accurate */
        }

        #editor:focus {
            outline: none;
            border-color: #2196F3;
        }

        /* Ensures empty lines render correctly (fixes Word double spacing) */
        #editor div {
            min-height: 1.2em; 
        }

        /* Action buttons at bottom */
        #controls {
            margin-top: 20px;
            width: 95%;
            max-width: 1000px;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .action-button {
            padding: 12px 24px;
            font-size: 1.05em;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            color: white;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .action-button:hover { opacity: 0.85; }
        #clear-btn { background-color: #dc3545; } /* Red */
        #copy-btn { background-color: #0d6efd; } /* Blue */

    </style>
</head>
<body>

    <h2>Radiology Report Formatter</h2>
    <p class="instructions">Paste your report, click "Auto-Format Headers", and use the taskbar for manual touch-ups.</p>

    <div id="toolbar">
        <button type="button" class="format-btn" data-command="bold" title="Bold (B)">B</button>
        <button type="button" class="format-btn" data-command="italic" title="Italic (I)">I</button>
        <button type="button" class="format-btn" data-command="underline" title="Underline (U)">U</button>
        
        <button type="button" id="auto-format-btn" title="Automatically bold titles and headers">✨ Auto-Format Headers</button>
    </div>

    <div id="editor" contenteditable="true"></div>

    <div id="controls">
        <button type="button" id="clear-btn" class="action-button">CLEAR</button>
        <button type="button" id="copy-btn" class="action-button">Copy formatted text</button>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const toolbar = document.getElementById('toolbar');
        const autoFormatBtn = document.getElementById('auto-format-btn');
        const clearBtn = document.getElementById('clear-btn');
        const copyBtn = document.getElementById('copy-btn');

        // 1. Manual Taskbar Logic
        toolbar.querySelectorAll('.format-btn').forEach(button => {
            button.addEventListener('click', () => {
                document.execCommand(button.dataset.command, false, null);
                editor.focus();
            });
        });

        // 2. The Automatic Header Formatting Logic
        autoFormatBtn.addEventListener('click', () => {
            // Grab raw text (splits by newlines properly)
            let text = editor.innerText;
            if (!text.trim()) return; 

            let lines = text.split('\n');
            let htmlOutput = "";
            let isFirstLine = true;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                let trimmedLine = line.trim();

                // Handle empty spaces cleanly so they don't double up
                if (trimmedLine === "") {
                    htmlOutput += "<div><br></div>";
                    continue;
                }

                // Escape special characters so HTML doesn't break
                line = line.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

                // Rule A: Bold the very first line of text
                if (isFirstLine) {
                    line = "<b>" + line + "</b>";
                    isFirstLine = false;
                }
                // Rule B: Bold words before the first colon ":"
                else if (line.includes(':')) {
                    line = line.replace(/^(.+?:)/, "<b>$1</b>");
                }
                // Backup: Strict words with no colons
                else if (trimmedLine === "IMPRESSION" || trimmedLine === "FINDINGS") {
                    line = "<b>" + line + "</b>";
                }

                // Wrap in divs to keep single-spacing accurate for Word/RIS
                htmlOutput += "<div>" + line + "</div>";
            }

            editor.innerHTML = htmlOutput;
        });

        // 3. Clear Button
        clearBtn.addEventListener('click', () => {
            if (confirm("Clear the editor?")) {
                editor.innerHTML = '';
                editor.focus();
            }
        });

        // 4. Copy to Clipboard Logic
        copyBtn.addEventListener('click', async () => {
            try {
                const htmlContent = editor.innerHTML;
                const blobHtml = new Blob([htmlContent], { type: "text/html" });
                const blobText = new Blob([editor.innerText], { type: "text/plain" });
                const data = [new ClipboardItem({ "text/html": blobHtml, "text/plain": blobText })];

                await navigator.clipboard.write(data);
                
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "✓ Copied!";
                copyBtn.style.backgroundColor = "#28a745"; 
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.style.backgroundColor = "#0d6efd"; 
                }, 2000);

            } catch (err) {
                const range = document.createRange();
                range.selectNodeContents(editor);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);
                document.execCommand('copy');
                selection.removeAllRanges();
                alert("Formatted report text copied!");
            }
        });
    </script>
</body>
</html>
